<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KIND CODE16 モンスター版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="bar">
    <b>KIND CODE16</b>
    <nav>
      <button data-go="home">トップ</button>
      <button data-go="quiz">診断</button>
      <button data-go="book">図鑑</button>
    </nav>
  </header>

  <main>
    <section id="home" class="page active">
      <img class="hero" src="https://raw.githubusercontent.com/nirucroud/kindcode16-animal/main/topgzo.jpg" alt="KIND CODE16 モンスター版トップ">
      <button class="start" data-go="quiz">診断をはじめる</button>
    </section>

    <section id="quiz" class="page">
      <div class="card">
        <p id="progress"></p>
        <h2 id="qtext"></h2>
        <div id="answers"></div>
        <button id="back">前へ</button>
      </div>
    </section>

    <section id="result" class="page">
      <div class="card">
        <h2 id="resultTitle"></h2>
        <p id="resultSub"></p>
        <img id="resultImg" class="resultImg" alt="診断結果">
        <div class="row">
          <button data-go="quiz">もう一度診断</button>
          <button data-go="book">図鑑を見る</button>
        </div>
      </div>
    </section>

    <section id="book" class="page">
      <h1>図鑑 - モンスタータイプ -</h1>
      <div class="tabs">
        <button onclick="showBook(0)">動物 1/2</button>
        <button onclick="showBook(1)">動物 2/2</button>
        <button onclick="showBook(2)">不思議 1/2</button>
        <button onclick="showBook(3)">不思議 2/2</button>
      </div>
      <img id="bookImg" class="bookImg" src="https://raw.githubusercontent.com/nirucroud/kindcode16-animal/main/animal1.jpeg" alt="図鑑ページ">
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
